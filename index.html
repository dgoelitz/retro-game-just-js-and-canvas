<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Retro Game Engine Lab</title>
    <style>
      body {
        margin: 0;
        min-height: 100vh;
        display: grid;
        place-items: center;
        background: #1a1a1a;
        color: white;
        font-family: "Trebuchet MS", sans-serif;
      }

      .shell {
        display: grid;
        gap: 16px;
        justify-items: center;
        padding: 24px;
      }

      h1,
      p {
        margin: 0;
      }

      canvas {
        width: 640px;
        height: 480px;
        border: 4px solid white;
        background: black;
        image-rendering: pixelated;
        image-rendering: crisp-edges;
      }

      @media (max-width: 700px) {
        canvas {
          width: 320px;
          height: 240px;
        }
      }
    </style>
  </head>
  <body>
    <main class="shell">
      <h1>Cool Adventure Game</h1>
      <p>Move with arrow keys or WASD. Attack with space.</p>
      <canvas id="game" width="160" height="120"></canvas>
    </main>

    <script type="module" src="./main.js"></script>
  </body>
</html>
